<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AgentLens — Health Heatmap</title>
  <link rel="stylesheet" href="styles.css">
  <style>
    .heatmap-container { padding: 24px; max-width: 1200px; margin: 0 auto; }
    .heatmap-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; flex-wrap: wrap; gap: 12px; }
    .heatmap-controls { display: flex; gap: 12px; align-items: center; flex-wrap: wrap; }
    .heatmap-controls select, .heatmap-controls button { padding: 6px 12px; border-radius: 6px; border: 1px solid var(--border); background: var(--card-bg); color: var(--text); font-size: 14px; cursor: pointer; }
    .heatmap-controls button.active { background: var(--accent); color: #fff; border-color: var(--accent); }

    .calendar-grid { display: flex; gap: 3px; flex-wrap: nowrap; overflow-x: auto; padding: 8px 0; }
    .week-col { display: flex; flex-direction: column; gap: 3px; }
    .day-cell { width: 16px; height: 16px; border-radius: 3px; cursor: pointer; transition: transform 0.15s, box-shadow 0.15s; position: relative; }
    .day-cell:hover { transform: scale(1.6); z-index: 10; box-shadow: 0 2px 8px rgba(0,0,0,0.3); }
    .day-labels { display: flex; flex-direction: column; gap: 3px; margin-right: 6px; padding-top: 24px; }
    .day-label { height: 16px; font-size: 10px; color: var(--text-muted); display: flex; align-items: center; }
    .month-labels { display: flex; gap: 3px; margin-left: 28px; margin-bottom: 4px; }
    .month-label { font-size: 11px; color: var(--text-muted); }

    .legend { display: flex; align-items: center; gap: 4px; margin-top: 12px; font-size: 12px; color: var(--text-muted); }
    .legend-cell { width: 14px; height: 14px; border-radius: 2px; }

    .tooltip { position: fixed; padding: 10px 14px; background: var(--card-bg); border: 1px solid var(--border); border-radius: 8px; font-size: 13px; pointer-events: none; z-index: 1000; box-shadow: 0 4px 16px rgba(0,0,0,0.2); max-width: 260px; }
    .tooltip .date { font-weight: 600; margin-bottom: 4px; }
    .tooltip .metric { display: flex; justify-content: space-between; gap: 16px; }
    .tooltip .metric-label { color: var(--text-muted); }

    .stats-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 12px; margin-bottom: 24px; }
    .stat-card { background: var(--card-bg); border: 1px solid var(--border); border-radius: 10px; padding: 16px; text-align: center; }
    .stat-value { font-size: 28px; font-weight: 700; }
    .stat-label { font-size: 12px; color: var(--text-muted); margin-top: 4px; }

    .hourly-panel { background: var(--card-bg); border: 1px solid var(--border); border-radius: 10px; padding: 20px; margin-top: 20px; }
    .hourly-title { font-size: 16px; font-weight: 600; margin-bottom: 12px; }
    .hourly-bars { display: flex; align-items: flex-end; gap: 4px; height: 120px; }
    .hourly-bar-wrap { flex: 1; display: flex; flex-direction: column; align-items: center; }
    .hourly-bar { width: 100%; border-radius: 3px 3px 0 0; transition: height 0.3s; cursor: pointer; min-height: 2px; }
    .hourly-label { font-size: 9px; color: var(--text-muted); margin-top: 4px; }

    .no-data { text-align: center; padding: 60px; color: var(--text-muted); font-size: 16px; }
  </style>
</head>
<body>
  <div id="app">
    <header class="header">
      <div class="header-left">
        <a href="index.html" style="text-decoration:none"><h1 class="logo">🔍 AgentLens</h1></a>
        <span class="tagline">Health Heatmap</span>
      </div>
      <div class="header-right">
        <a href="index.html" class="btn btn-alert-header" style="text-decoration:none">📋 Sessions</a>
        <a href="command-center.html" class="btn btn-alert-header" style="text-decoration:none">🎯 Command</a>
        <a href="errors.html" class="btn btn-alert-header" style="text-decoration:none">🐛 Errors</a>
        <button class="theme-toggle" onclick="toggleTheme()" title="Toggle theme" id="themeToggleBtn">🌙</button>
      </div>
    </header>

    <main class="heatmap-container">
      <div class="heatmap-header">
        <h2>🗓️ Agent Health Heatmap</h2>
        <div class="heatmap-controls">
          <select id="agentFilter"><option value="">All Agents</option></select>
          <button class="active" data-days="90" onclick="setDays(90)">90d</button>
          <button data-days="180" onclick="setDays(180)">180d</button>
          <button data-days="365" onclick="setDays(365)">1y</button>
        </div>
      </div>

      <div class="stats-row" id="statsRow"></div>

      <div id="heatmapWrap">
        <div class="month-labels" id="monthLabels"></div>
        <div style="display:flex">
          <div class="day-labels">
            <div class="day-label">&nbsp;</div>
            <div class="day-label">Mon</div>
            <div class="day-label">&nbsp;</div>
            <div class="day-label">Wed</div>
            <div class="day-label">&nbsp;</div>
            <div class="day-label">Fri</div>
            <div class="day-label">&nbsp;</div>
          </div>
          <div class="calendar-grid" id="calendarGrid"></div>
        </div>
        <div class="legend" id="legend">
          <span>Less healthy</span>
          <div class="legend-cell" style="background:#d73a49"></div>
          <div class="legend-cell" style="background:#e97051"></div>
          <div class="legend-cell" style="background:#f0ad4e"></div>
          <div class="legend-cell" style="background:#a3d977"></div>
          <div class="legend-cell" style="background:#28a745"></div>
          <span>More healthy</span>
          <span style="margin-left:12px">|</span>
          <div class="legend-cell" style="background:var(--border)"></div>
          <span>No data</span>
        </div>
      </div>

      <div class="hourly-panel" id="hourlyPanel" style="display:none">
        <div class="hourly-title" id="hourlyTitle">Hourly Breakdown</div>
        <div class="hourly-bars" id="hourlyBars"></div>
      </div>
    </main>

    <div class="tooltip" id="tooltip" style="display:none"></div>
  </div>

  <script>
    // Theme
    const saved = localStorage.getItem('agentlens-theme');
    if (saved === 'light') document.body.classList.add('light-mode');
    function toggleTheme() {
      document.body.classList.toggle('light-mode');
      localStorage.setItem('agentlens-theme', document.body.classList.contains('light-mode') ? 'light' : 'dark');
      const b = document.getElementById('themeToggleBtn');
      b.textContent = document.body.classList.contains('light-mode') ? '☀️' : '🌙';
    }
    if (saved === 'light') document.getElementById('themeToggleBtn').textContent = '☀️';

    const API = window.location.origin;
    let currentDays = 90;
    let heatmapData = [];

    function healthColor(h) {
      if (h === null || h === undefined) return 'var(--border)';
      if (h >= 90) return '#28a745';
      if (h >= 75) return '#a3d977';
      if (h >= 50) return '#f0ad4e';
      if (h >= 25) return '#e97051';
      return '#d73a49';
    }

    function setDays(d) {
      currentDays = d;
      document.querySelectorAll('[data-days]').forEach(b => b.classList.toggle('active', parseInt(b.dataset.days) === d));
      loadData();
    }

    async function loadAgents() {
      try {
        const r = await fetch(`${API}/heatmap/agents`);
        const agents = await r.json();
        const sel = document.getElementById('agentFilter');
        agents.forEach(a => { const o = document.createElement('option'); o.value = a; o.textContent = a; sel.appendChild(o); });
        sel.onchange = () => loadData();
      } catch {}
    }

    async function loadData() {
      const agent = document.getElementById('agentFilter').value;
      const q = agent ? `&agent=${encodeURIComponent(agent)}` : '';
      try {
        const r = await fetch(`${API}/heatmap/data?days=${currentDays}${q}`);
        const json = await r.json();
        heatmapData = json.data || [];
      } catch {
        heatmapData = [];
      }
      renderStats();
      renderCalendar();
    }

    function renderStats() {
      const el = document.getElementById('statsRow');
      if (!heatmapData.length) { el.innerHTML = ''; return; }
      const totalEvents = heatmapData.reduce((s, d) => s + d.totalEvents, 0);
      const totalErrors = heatmapData.reduce((s, d) => s + d.errors, 0);
      const avgHealth = Math.round(heatmapData.reduce((s, d) => s + d.health, 0) / heatmapData.length);
      const activeDays = heatmapData.length;
      const avgLatency = heatmapData.filter(d => d.avgLatencyMs).reduce((s, d, _, a) => s + d.avgLatencyMs / a.length, 0);

      el.innerHTML = `
        <div class="stat-card"><div class="stat-value" style="color:${healthColor(avgHealth)}">${avgHealth}</div><div class="stat-label">Avg Health Score</div></div>
        <div class="stat-card"><div class="stat-value">${activeDays}</div><div class="stat-label">Active Days</div></div>
        <div class="stat-card"><div class="stat-value">${totalEvents.toLocaleString()}</div><div class="stat-label">Total Events</div></div>
        <div class="stat-card"><div class="stat-value" style="color:#d73a49">${totalErrors.toLocaleString()}</div><div class="stat-label">Total Errors</div></div>
        <div class="stat-card"><div class="stat-value">${avgLatency ? Math.round(avgLatency) + 'ms' : '—'}</div><div class="stat-label">Avg Latency</div></div>
      `;
    }

    function renderCalendar() {
      const grid = document.getElementById('calendarGrid');
      const monthBar = document.getElementById('monthLabels');
      grid.innerHTML = '';
      monthBar.innerHTML = '';

      const dataMap = {};
      heatmapData.forEach(d => dataMap[d.date] = d);

      const today = new Date();
      const start = new Date(today);
      start.setDate(start.getDate() - currentDays);
      // Align to Sunday
      start.setDate(start.getDate() - start.getDay());

      const weeks = [];
      let current = new Date(start);
      let week = [];
      let lastMonth = -1;
      const months = [];

      while (current <= today) {
        if (current.getDay() === 0 && week.length) {
          weeks.push(week);
          week = [];
        }
        const dateStr = current.toISOString().slice(0, 10);
        const m = current.getMonth();
        if (m !== lastMonth && current.getDay() <= 3) {
          months.push({ col: weeks.length, name: current.toLocaleDateString('en', { month: 'short' }) });
          lastMonth = m;
        }
        week.push({ date: dateStr, data: dataMap[dateStr] || null, future: current > today });
        current.setDate(current.getDate() + 1);
      }
      if (week.length) weeks.push(week);

      // Month labels
      let html = '';
      const cellW = 19; // 16 + 3 gap
      months.forEach(m => { html += `<span class="month-label" style="margin-left:${m.col * cellW}px;position:absolute">${m.name}</span>`; });
      monthBar.style.position = 'relative';
      monthBar.style.height = '18px';
      monthBar.innerHTML = html;

      // Cells
      weeks.forEach(w => {
        const col = document.createElement('div');
        col.className = 'week-col';
        w.forEach(d => {
          const cell = document.createElement('div');
          cell.className = 'day-cell';
          if (d.future) {
            cell.style.background = 'transparent';
            cell.style.border = '1px dashed var(--border)';
          } else {
            cell.style.background = d.data ? healthColor(d.data.health) : 'var(--border)';
          }
          cell.dataset.date = d.date;
          cell.addEventListener('mouseenter', e => showTooltip(e, d));
          cell.addEventListener('mouseleave', hideTooltip);
          cell.addEventListener('click', () => { if (d.data) loadHourly(d.date); });
          col.appendChild(cell);
        });
        grid.appendChild(col);
      });

      if (!heatmapData.length) {
        grid.innerHTML = '<div class="no-data">No event data yet. Start sending events to see your health heatmap.</div>';
      }
    }

    const tooltip = document.getElementById('tooltip');
    function showTooltip(e, d) {
      if (!d.data && d.future) return;
      const day = new Date(d.date + 'T12:00:00');
      const formatted = day.toLocaleDateString('en', { weekday: 'short', month: 'short', day: 'numeric', year: 'numeric' });
      if (!d.data) {
        tooltip.innerHTML = `<div class="date">${formatted}</div><div style="color:var(--text-muted)">No data</div>`;
      } else {
        tooltip.innerHTML = `
          <div class="date">${formatted}</div>
          <div class="metric"><span class="metric-label">Health</span><strong style="color:${healthColor(d.data.health)}">${d.data.health}/100</strong></div>
          <div class="metric"><span class="metric-label">Events</span><span>${d.data.totalEvents.toLocaleString()}</span></div>
          <div class="metric"><span class="metric-label">Errors</span><span style="color:#d73a49">${d.data.errors}</span></div>
          <div class="metric"><span class="metric-label">Sessions</span><span>${d.data.uniqueSessions}</span></div>
          <div class="metric"><span class="metric-label">Avg Latency</span><span>${d.data.avgLatencyMs ? d.data.avgLatencyMs + 'ms' : '—'}</span></div>
          <div class="metric"><span class="metric-label">Tokens</span><span>${d.data.totalTokens.toLocaleString()}</span></div>
          <div style="color:var(--text-muted);font-size:11px;margin-top:4px">Click for hourly view</div>
        `;
      }
      tooltip.style.display = 'block';
      tooltip.style.left = Math.min(e.clientX + 12, window.innerWidth - 280) + 'px';
      tooltip.style.top = (e.clientY + 12) + 'px';
    }
    function hideTooltip() { tooltip.style.display = 'none'; }

    async function loadHourly(date) {
      const agent = document.getElementById('agentFilter').value;
      const q = agent ? `&agent=${encodeURIComponent(agent)}` : '';
      const panel = document.getElementById('hourlyPanel');
      panel.style.display = 'block';
      document.getElementById('hourlyTitle').textContent = `Hourly Breakdown — ${new Date(date + 'T12:00:00').toLocaleDateString('en', { weekday: 'long', month: 'long', day: 'numeric', year: 'numeric' })}`;

      try {
        const r = await fetch(`${API}/heatmap/hourly?date=${date}${q}`);
        const json = await r.json();
        renderHourly(json.hourly);
      } catch {
        renderHourly(Array.from({ length: 24 }, (_, i) => ({ hour: i, totalEvents: 0, errors: 0 })));
      }
      panel.scrollIntoView({ behavior: 'smooth' });
    }

    function renderHourly(data) {
      const el = document.getElementById('hourlyBars');
      const max = Math.max(1, ...data.map(d => d.totalEvents));
      el.innerHTML = data.map(d => {
        const h = Math.max(2, (d.totalEvents / max) * 110);
        const errH = d.errors ? Math.max(2, (d.errors / max) * 110) : 0;
        const color = d.errors > 0 && d.totalEvents > 0 ? (d.errors / d.totalEvents > 0.3 ? '#d73a49' : '#f0ad4e') : '#28a745';
        return `<div class="hourly-bar-wrap">
          <div class="hourly-bar" style="height:${h}px;background:${color}" title="${d.totalEvents} events, ${d.errors} errors"></div>
          <div class="hourly-label">${d.hour}</div>
        </div>`;
      }).join('');
    }

    // Init
    loadAgents();
    loadData();
  </script>
</body>
</html>
