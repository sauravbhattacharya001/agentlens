<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AgentLens — Agent Scorecards</title>
  <link rel="stylesheet" href="styles.css">
  <style>
    .scorecard-controls { display: flex; gap: 12px; align-items: center; margin-bottom: 20px; flex-wrap: wrap; }
    .scorecard-controls select, .scorecard-controls input { padding: 8px 12px; border-radius: 6px; border: 1px solid var(--border, #374151); background: var(--surface, #1f2937); color: var(--text, #e5e7eb); font-size: 14px; }
    .scorecard-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); gap: 16px; }
    .scorecard-card { background: var(--surface, #1f2937); border-radius: 12px; padding: 20px; border: 1px solid var(--border, #374151); transition: transform 0.15s, box-shadow 0.15s; cursor: pointer; }
    .scorecard-card:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(0,0,0,0.3); }
    .sc-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 16px; }
    .sc-agent { font-size: 18px; font-weight: 600; color: var(--text, #e5e7eb); }
    .sc-grade { font-size: 32px; font-weight: 800; line-height: 1; }
    .sc-score { font-size: 13px; color: var(--text-muted, #9ca3af); margin-top: 2px; }
    .sc-metrics { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 14px; }
    .sc-metric { padding: 8px; background: var(--bg, #111827); border-radius: 6px; }
    .sc-metric-label { font-size: 11px; color: var(--text-muted, #9ca3af); text-transform: uppercase; letter-spacing: 0.5px; }
    .sc-metric-value { font-size: 18px; font-weight: 600; color: var(--text, #e5e7eb); }
    .sc-sparkline { height: 32px; margin-top: 8px; }
    .sc-sparkline svg { width: 100%; height: 100%; }
    .sc-dates { font-size: 11px; color: var(--text-muted, #9ca3af); margin-top: 8px; }

    /* Detail modal */
    .sc-modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 1000; display: none; justify-content: center; align-items: flex-start; padding: 40px 20px; overflow-y: auto; }
    .sc-modal-overlay.open { display: flex; }
    .sc-modal { background: var(--surface, #1f2937); border-radius: 12px; padding: 28px; max-width: 700px; width: 100%; border: 1px solid var(--border, #374151); }
    .sc-modal h2 { margin: 0 0 4px; color: var(--text, #e5e7eb); }
    .sc-modal-close { float: right; background: none; border: none; color: var(--text-muted, #9ca3af); font-size: 24px; cursor: pointer; }
    .sc-model-table { width: 100%; border-collapse: collapse; margin-top: 12px; }
    .sc-model-table th, .sc-model-table td { text-align: left; padding: 6px 10px; border-bottom: 1px solid var(--border, #374151); font-size: 13px; }
    .sc-model-table th { color: var(--text-muted, #9ca3af); text-transform: uppercase; font-size: 11px; }
    .sc-chart-container { margin-top: 16px; }
    .sc-chart-container h3 { font-size: 14px; color: var(--text-muted, #9ca3af); margin-bottom: 8px; }
    .sc-bar-chart { display: flex; align-items: flex-end; gap: 2px; height: 80px; }
    .sc-bar { background: #3b82f6; border-radius: 2px 2px 0 0; min-width: 6px; flex: 1; position: relative; }
    .sc-bar:hover::after { content: attr(data-tip); position: absolute; bottom: 100%; left: 50%; transform: translateX(-50%); background: #111; color: #e5e7eb; padding: 2px 6px; border-radius: 4px; font-size: 11px; white-space: nowrap; }
    .sc-summary { display: flex; gap: 20px; margin: 16px 0; flex-wrap: wrap; }
    .sc-summary-item { text-align: center; }
    .sc-summary-big { font-size: 28px; font-weight: 700; }
    .sc-summary-label { font-size: 11px; color: var(--text-muted, #9ca3af); text-transform: uppercase; }
  </style>
</head>
<body>
  <div id="app">
    <header class="header">
      <div class="header-left">
        <h1 class="logo">🔍 AgentLens</h1>
        <span class="tagline">Agent Scorecards</span>
      </div>
      <div class="header-right">
        <button class="theme-toggle" onclick="toggleTheme()" title="Toggle theme" id="themeToggleBtn">🌙</button>
        <a href="index.html" class="btn btn-alert-header" style="text-decoration:none">📋 Dashboard</a>
        <a href="waterfall.html" class="btn btn-alert-header" style="text-decoration:none">📊 Waterfall</a>
      </div>
    </header>

    <main class="main" style="padding: 24px;">
      <div class="scorecard-controls">
        <label style="color:var(--text-muted,#9ca3af);font-size:13px;">Time Range:</label>
        <select id="daysSelect" onchange="loadScorecards()">
          <option value="7">Last 7 days</option>
          <option value="14">Last 14 days</option>
          <option value="30" selected>Last 30 days</option>
          <option value="90">Last 90 days</option>
          <option value="365">Last year</option>
        </select>
        <input type="text" id="agentSearch" placeholder="Filter agents..." oninput="filterCards()" style="min-width:200px;">
        <span id="agentCount" style="color:var(--text-muted,#9ca3af);font-size:13px;"></span>
      </div>
      <div id="scorecardGrid" class="scorecard-grid">
        <div style="color:var(--text-muted,#9ca3af);">Loading scorecards...</div>
      </div>
    </main>

    <!-- Detail modal -->
    <div class="sc-modal-overlay" id="detailModal">
      <div class="sc-modal">
        <button class="sc-modal-close" onclick="closeDetail()">&times;</button>
        <div id="detailContent"></div>
      </div>
    </div>
  </div>

    <script>
    (function() {
      var saved = localStorage.getItem('agentlens-theme') || 'dark';
      if (saved === 'light') document.documentElement.setAttribute('data-theme', 'light');
    })();
    function toggleTheme() {
      var current = document.documentElement.getAttribute('data-theme');
      var next = current === 'light' ? 'dark' : 'light';
      if (next === 'light') document.documentElement.setAttribute('data-theme', 'light');
      else document.documentElement.removeAttribute('data-theme');
      localStorage.setItem('agentlens-theme', next);
      var btn = document.getElementById('themeToggleBtn');
      if (btn) btn.textContent = next === 'light' ? '☀️' : '🌙';
    }
  </script>
  <script>
    const API = window.location.origin;
    let allCards = [];

    async function loadScorecards() {
      const days = document.getElementById("daysSelect").value;
      const grid = document.getElementById("scorecardGrid");
      grid.innerHTML = '<div style="color:var(--text-muted,#9ca3af);">Loading...</div>';
      try {
        const res = await fetch(`${API}/scorecards?days=${days}`);
        const data = await res.json();
        allCards = data.scorecards || [];
        document.getElementById("agentCount").textContent = `${allCards.length} agent${allCards.length !== 1 ? 's' : ''}`;
        renderCards(allCards);
      } catch (e) {
        grid.innerHTML = `<div style="color:#ef4444;">Failed to load: ${e.message}</div>`;
      }
    }

    function filterCards() {
      const q = document.getElementById("agentSearch").value.toLowerCase();
      const filtered = q ? allCards.filter(c => c.agent_name.toLowerCase().includes(q)) : allCards;
      renderCards(filtered);
    }

    function renderCards(cards) {
      const grid = document.getElementById("scorecardGrid");
      if (!cards.length) { grid.innerHTML = '<div style="color:var(--text-muted,#9ca3af);">No agents found.</div>'; return; }
      grid.innerHTML = cards.map(c => `
        <div class="scorecard-card" onclick="openDetail('${c.agent_name}')">
          <div class="sc-header">
            <div>
              <div class="sc-agent">${esc(c.agent_name)}</div>
              <div class="sc-score">${c.composite_score} / 100</div>
            </div>
            <div style="text-align:right;">
              <div class="sc-grade" style="color:${c.grade_color}">${c.grade}</div>
            </div>
          </div>
          <div class="sc-metrics">
            <div class="sc-metric"><div class="sc-metric-label">Sessions</div><div class="sc-metric-value">${c.metrics.total_sessions}</div></div>
            <div class="sc-metric"><div class="sc-metric-label">Success</div><div class="sc-metric-value" style="color:${c.metrics.success_rate>=90?'#22c55e':c.metrics.success_rate>=70?'#eab308':'#ef4444'}">${c.metrics.success_rate}%</div></div>
            <div class="sc-metric"><div class="sc-metric-label">Avg Latency</div><div class="sc-metric-value">${c.metrics.avg_latency_ms > 0 ? c.metrics.avg_latency_ms + 'ms' : '—'}</div></div>
            <div class="sc-metric"><div class="sc-metric-label">Errors</div><div class="sc-metric-value" style="color:${c.metrics.errors > 0 ? '#ef4444' : '#22c55e'}">${c.metrics.errors}</div></div>
          </div>
          ${renderSparkline(c.trend)}
          <div class="sc-dates">Last seen: ${c.last_seen ? new Date(c.last_seen).toLocaleDateString() : '—'}</div>
        </div>
      `).join('');
    }

    function renderSparkline(trend) {
      if (!trend || trend.length < 2) return '';
      const max = Math.max(...trend.map(t => t.sessions), 1);
      const w = 100 / trend.length;
      const points = trend.map((t, i) => {
        const x = (i / (trend.length - 1)) * 100;
        const y = 100 - (t.sessions / max) * 100;
        return `${x},${y}`;
      }).join(' ');
      return `<div class="sc-sparkline"><svg viewBox="0 0 100 100" preserveAspectRatio="none"><polyline points="${points}" fill="none" stroke="#3b82f6" stroke-width="2" vector-effect="non-scaling-stroke"/></svg></div>`;
    }

    async function openDetail(agent) {
      const days = document.getElementById("daysSelect").value;
      const modal = document.getElementById("detailModal");
      const content = document.getElementById("detailContent");
      content.innerHTML = '<div style="color:var(--text-muted,#9ca3af);">Loading...</div>';
      modal.classList.add("open");
      try {
        const res = await fetch(`${API}/scorecards/${encodeURIComponent(agent)}?days=${days}`);
        const d = await res.json();
        if (res.status === 404) { content.innerHTML = `<div style="color:#ef4444;">${d.error}</div>`; return; }

        const modelsHtml = d.models.length ? `
          <div class="sc-chart-container">
            <h3>Model Usage</h3>
            <table class="sc-model-table">
              <thead><tr><th>Model</th><th>Calls</th><th>Tokens In</th><th>Tokens Out</th><th>Avg Latency</th></tr></thead>
              <tbody>${d.models.map(m => `<tr><td>${esc(m.model || '—')}</td><td>${m.calls}</td><td>${m.tokens_in.toLocaleString()}</td><td>${m.tokens_out.toLocaleString()}</td><td>${Math.round(m.avg_latency_ms || 0)}ms</td></tr>`).join('')}</tbody>
            </table>
          </div>` : '';

        const trendHtml = d.daily_trend.length ? (() => {
          const max = Math.max(...d.daily_trend.map(t => t.sessions), 1);
          return `<div class="sc-chart-container"><h3>Daily Sessions</h3><div class="sc-bar-chart">${d.daily_trend.map(t => {
            const h = (t.sessions / max) * 100;
            const errH = t.errors > 0 ? (t.errors / max) * 100 : 0;
            return `<div style="display:flex;flex-direction:column;align-items:stretch;flex:1;height:100%;justify-content:flex-end;">
              ${errH > 0 ? `<div class="sc-bar" style="height:${errH}%;background:#ef4444;" data-tip="${t.day}: ${t.errors} errors"></div>` : ''}
              <div class="sc-bar" data-tip="${t.day}: ${t.sessions} sessions" style="height:${h}%;"></div>
            </div>`;
          }).join('')}</div></div>`;
        })() : '';

        content.innerHTML = `
          <h2>${esc(d.agent_name)}</h2>
          <div class="sc-summary">
            <div class="sc-summary-item"><div class="sc-summary-big">${d.metrics.total_sessions}</div><div class="sc-summary-label">Sessions</div></div>
            <div class="sc-summary-item"><div class="sc-summary-big" style="color:#22c55e">${d.metrics.success_rate}%</div><div class="sc-summary-label">Success Rate</div></div>
            <div class="sc-summary-item"><div class="sc-summary-big" style="color:#ef4444">${d.metrics.error_rate}%</div><div class="sc-summary-label">Error Rate</div></div>
            <div class="sc-summary-item"><div class="sc-summary-big">${d.metrics.total_tokens.toLocaleString()}</div><div class="sc-summary-label">Total Tokens</div></div>
          </div>
          ${modelsHtml}
          ${trendHtml}
          <div class="sc-dates" style="margin-top:16px;">First seen: ${d.first_seen ? new Date(d.first_seen).toLocaleString() : '—'} · Last seen: ${d.last_seen ? new Date(d.last_seen).toLocaleString() : '—'}</div>
        `;
      } catch (e) {
        content.innerHTML = `<div style="color:#ef4444;">Error: ${e.message}</div>`;
      }
    }

    function closeDetail() { document.getElementById("detailModal").classList.remove("open"); }
    document.getElementById("detailModal").addEventListener("click", (e) => { if (e.target === e.currentTarget) closeDetail(); });
    document.addEventListener("keydown", (e) => { if (e.key === "Escape") closeDetail(); });

    function esc(s) { const d = document.createElement("div"); d.textContent = s; return d.innerHTML; }

    loadScorecards();
  </script>
</body>
</html>
