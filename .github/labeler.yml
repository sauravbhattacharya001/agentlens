# Auto-labeler configuration for agentlens
# Maps file path patterns to labels applied on pull requests
# Used by actions/labeler@v5

# Component labels
sdk:
  - changed-files:
    - any-glob-to-any-file:
      - 'sdk/**'

backend:
  - changed-files:
    - any-glob-to-any-file:
      - 'backend/**'

dashboard:
  - changed-files:
    - any-glob-to-any-file:
      - 'dashboard/**'

demo:
  - changed-files:
    - any-glob-to-any-file:
      - 'demo/**'

# Feature-area labels (SDK modules)
cli:
  - changed-files:
    - any-glob-to-any-file:
      - 'sdk/agentlens/cli*.py'

alerting:
  - changed-files:
    - any-glob-to-any-file:
      - 'sdk/agentlens/alert*.py'
      - 'sdk/agentlens/cli_alert*.py'
      - 'sdk/agentlens/tracker_alerts.py'
      - 'backend/routes/alerts.js'
      - 'dashboard/alerts.html'

cost-optimization:
  - changed-files:
    - any-glob-to-any-file:
      - 'sdk/agentlens/cost_optimizer.py'
      - 'sdk/agentlens/budget.py'
      - 'sdk/agentlens/cli_budget.py'
      - 'sdk/agentlens/quota.py'
      - 'backend/routes/budgets.js'
      - 'backend/lib/pricing.js'
      - 'backend/routes/pricing.js'
      - 'dashboard/costs.html'
      - 'dashboard/cost-anomaly.html'

observability:
  - changed-files:
    - any-glob-to-any-file:
      - 'sdk/agentlens/tracker.py'
      - 'sdk/agentlens/transport.py'
      - 'sdk/agentlens/decorators.py'
      - 'sdk/agentlens/span.py'
      - 'sdk/agentlens/sampling.py'
      - 'sdk/agentlens/exporter.py'

ai-safety:
  - changed-files:
    - any-glob-to-any-file:
      - 'sdk/agentlens/guardrails.py'
      - 'sdk/agentlens/prompt_injection.py'
      - 'sdk/agentlens/cognitive_bias.py'
      - 'sdk/agentlens/cli_prompt_injection.py'
      - 'sdk/agentlens/cli_cognitive_bias.py'

analytics:
  - changed-files:
    - any-glob-to-any-file:
      - 'sdk/agentlens/forecast.py'
      - 'sdk/agentlens/correlation.py'
      - 'sdk/agentlens/anomaly.py'
      - 'sdk/agentlens/heatmap.py'
      - 'sdk/agentlens/flamegraph.py'
      - 'sdk/agentlens/drift.py'
      - 'sdk/agentlens/group_analyzer.py'
      - 'backend/routes/analytics.js'
      - 'backend/routes/anomalies.js'
      - 'backend/routes/correlations.js'
      - 'backend/routes/forecast.js'

reliability:
  - changed-files:
    - any-glob-to-any-file:
      - 'sdk/agentlens/sla.py'
      - 'sdk/agentlens/stamina.py'
      - 'sdk/agentlens/health.py'
      - 'sdk/agentlens/failure_forecast.py'
      - 'sdk/agentlens/retry_tracker.py'
      - 'sdk/agentlens/self_correction.py'
      - 'backend/routes/sla.js'

# Documentation
documentation:
  - changed-files:
    - any-glob-to-any-file:
      - 'docs/**'
      - '**/*.md'
      - 'sdk/README.md'

# CI/CD and infrastructure
ci/cd:
  - changed-files:
    - any-glob-to-any-file:
      - '.github/**'

# Docker and deployment
docker:
  - changed-files:
    - any-glob-to-any-file:
      - 'Dockerfile'
      - '.dockerignore'
      - '.github/workflows/docker.yml'

# Testing
tests:
  - changed-files:
    - any-glob-to-any-file:
      - 'backend/tests/**'
      - 'sdk/tests/**'
      - 'tests/**'
      - '**/*.test.js'
      - '**/test_*.py'

# Python SDK specifics
python:
  - changed-files:
    - any-glob-to-any-file:
      - '**/*.py'
      - 'sdk/pyproject.toml'

# JavaScript/Node.js
javascript:
  - changed-files:
    - any-glob-to-any-file:
      - '**/*.js'
      - '**/package.json'
      - '**/package-lock.json'

# Dependencies
dependencies:
  - changed-files:
    - any-glob-to-any-file:
      - 'backend/package.json'
      - 'backend/package-lock.json'
      - 'sdk/pyproject.toml'
      - '.github/dependabot.yml'

# Security-related changes
security:
  - changed-files:
    - any-glob-to-any-file:
      - 'backend/middleware.js'
      - 'backend/lib/validation.js'
      - '.github/workflows/codeql.yml'
      - 'sdk/agentlens/guardrails.py'
      - 'sdk/agentlens/prompt_injection.py'
      - 'sdk/agentlens/rate_limiter.py'
      - 'SECURITY.md'

# Database/storage
database:
  - changed-files:
    - any-glob-to-any-file:
      - 'backend/db.js'
      - 'backend/migrations.js'
      - 'backend/seed.js'
      - 'backend/lib/statement-cache.js'
      - 'backend/lib/response-cache.js'
