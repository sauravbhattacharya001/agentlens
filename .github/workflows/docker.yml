name: Docker

on:
  push:
    branches: [master, main]
    tags: ["v*"]
  pull_request:
    branches: [master, main]
  schedule:
    # Weekly rebuild to pick up base image security patches (Alpine, Node)
    - cron: "15 4 * * 1"

permissions:
  contents: read
  packages: write
  security-events: write
  id-token: write
  attestations: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up QEMU (multi-arch)
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=sha,prefix=
            type=schedule,pattern=weekly

      - name: Build and push
        id: build
        uses: docker/build-push-action@v7
        with:
          context: .
          push: ${{ github.event_name != 'pull_request' }}
          load: ${{ github.event_name == 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: ${{ github.event_name != 'pull_request' && 'linux/amd64,linux/arm64' || 'linux/amd64' }}

      - name: Run Trivy vulnerability scanner (SARIF)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH
          exit-code: 0
        if: github.event_name == 'pull_request'

      - name: Upload Trivy scan to GitHub Security
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-results.sarif
        if: github.event_name == 'pull_request' && always()

      - name: Run Trivy scan (push/schedule — table output)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          format: table
          severity: CRITICAL,HIGH
          exit-code: 0
        if: github.event_name != 'pull_request'

      - name: Smoke test (PR only)
        if: github.event_name == 'pull_request'
        run: |
          IMAGE=$(echo "${{ steps.meta.outputs.tags }}" | head -1)
          docker run -d --name smoke -p 3000:3000 "$IMAGE"
          sleep 5
          STATUS=$(docker inspect --format='{{.State.Running}}' smoke)
          if [ "$STATUS" != "true" ]; then
            echo "::error::Container failed to start"
            docker logs smoke
            exit 1
          fi
          # Verify health endpoint responds
          HEALTH=$(curl -sf http://localhost:3000/health || echo '{}')
          echo "Health check response: $HEALTH"
          if ! echo "$HEALTH" | grep -q '"status":"ok"'; then
            echo "::warning::Health endpoint did not return ok"
          fi
          docker stop smoke && docker rm smoke

      - name: Container structure test
        if: github.event_name == 'pull_request'
        run: |
          IMAGE=$(echo "${{ steps.meta.outputs.tags }}" | head -1)
          # Verify non-root user
          USER=$(docker run --rm --entrypoint whoami "$IMAGE" 2>/dev/null || echo "unknown")
          echo "Container user: $USER"
          if [ "$USER" != "agentlens" ]; then
            echo "::error::Container runs as $USER, expected agentlens"
            exit 1
          fi
          # Verify required files exist
          docker run --rm --entrypoint sh "$IMAGE" -c '
            test -f /app/backend/server.js || { echo "Missing server.js"; exit 1; }
            test -d /app/dashboard || { echo "Missing dashboard"; exit 1; }
            test -d /app/data || { echo "Missing data dir"; exit 1; }
            node -e "require(\"/app/backend/server.js\")" 2>/dev/null &
            sleep 2 && kill %1 2>/dev/null
            echo "Structure OK"
          '

      - name: Generate SBOM
        if: github.event_name != 'pull_request'
        uses: anchore/sbom-action@v0
        with:
          image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          format: spdx-json
          output-file: sbom.spdx.json

      - name: Attest build provenance
        if: github.event_name != 'pull_request'
        uses: actions/attest-build-provenance@v4
        with:
          subject-name: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true

      - name: Attest SBOM
        if: github.event_name != 'pull_request' && steps.build.outputs.digest
        uses: actions/attest-sbom@v2
        with:
          subject-name: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          subject-digest: ${{ steps.build.outputs.digest }}
          sbom-path: sbom.spdx.json
          push-to-registry: true

      - name: Image digest
        if: github.event_name != 'pull_request'
        run: echo "Pushed ${{ steps.meta.outputs.tags }}"
