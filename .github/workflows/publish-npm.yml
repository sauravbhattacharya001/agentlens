name: Publish Backend to npm

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      publish_target:
        description: 'Publish target'
        required: true
        default: 'dry-run'
        type: choice
        options:
          - dry-run
          - npm

permissions:
  contents: read
  id-token: write  # Required for npm provenance

jobs:
  build-and-test:
    name: Build & test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Validate version matches release tag
        if: github.event_name == 'release'
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          # Strip leading 'v' from tag (v1.2.3 → 1.2.3)
          TAG_VERSION="${TAG#v}"
          PKG_VERSION=$(node -p "require('./package.json').version")
          echo "Release tag version: $TAG_VERSION"
          echo "Package version: $PKG_VERSION"
          if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
            echo "::error::Version mismatch! Release tag '$TAG_VERSION' != package.json version '$PKG_VERSION'"
            echo "Update backend/package.json version to match the release tag before publishing."
            exit 1
          fi
          echo "✅ Version match confirmed: $PKG_VERSION"

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Verify package
        run: npm pack --dry-run

      - name: Pack for publishing
        run: npm pack

      - name: Upload package artifact
        uses: actions/upload-artifact@v7
        with:
          name: npm-package
          path: backend/*.tgz

  publish-npm:
    name: Publish to npm
    needs: build-and-test
    if: github.event_name == 'release' || (github.event_name == 'workflow_dispatch' && inputs.publish_target == 'npm')
    runs-on: ubuntu-latest
    environment:
      name: npm
      url: https://www.npmjs.com/package/agentlens-backend
    steps:
      - uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          registry-url: https://registry.npmjs.org
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        working-directory: backend
        run: npm ci

      - name: Publish to npm
        working-directory: backend
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  dry-run:
    name: Publish dry run
    needs: build-and-test
    if: github.event_name == 'workflow_dispatch' && inputs.publish_target == 'dry-run'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          registry-url: https://registry.npmjs.org
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        working-directory: backend
        run: npm ci

      - name: Dry run publish
        working-directory: backend
        run: npm publish --dry-run
