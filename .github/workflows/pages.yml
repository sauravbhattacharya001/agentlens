name: Deploy to GitHub Pages

on:
  push:
    branches: [master]
    paths:
      - 'docs/**'
      - 'dashboard/**'
      - 'demo/**'
      - '.github/workflows/pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build site
        run: |
          mkdir -p _site
          # Copy docs as the main site
          cp -r docs/* _site/
          # Copy interactive demo
          mkdir -p _site/demo
          cp -r demo/* _site/demo/
          # Copy full dashboard app
          mkdir -p _site/dashboard
          cp -r dashboard/* _site/dashboard/
          # Add navigation redirects
          echo '<meta http-equiv="refresh" content="0;url=dashboard/">' > _site/app.html

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: '_site'

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
