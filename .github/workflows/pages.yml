name: Deploy to GitHub Pages

on:
  push:
    branches: [master]
    paths:
      - 'docs/**'
      - 'dashboard/**'
      - 'demo/**'
      - '.github/workflows/pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build site
        run: |
          mkdir -p _site
          # Copy docs as the main site
          cp -r docs/* _site/
          # Copy interactive demo
          mkdir -p _site/demo
          cp -r demo/* _site/demo/
          # Copy full dashboard app
          mkdir -p _site/dashboard
          cp -r dashboard/* _site/dashboard/
          # Add navigation redirects
          echo '<meta http-equiv="refresh" content="0;url=dashboard/">' > _site/app.html
          # Add 404 page
          cat > _site/404.html << 'EOF'
          <!DOCTYPE html>
          <html lang="en">
          <head>
            <meta charset="UTF-8">
            <meta name="viewport" content="width=device-width, initial-scale=1.0">
            <title>Page Not Found — AgentLens</title>
            <style>
              body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; background: #0f172a; color: #e2e8f0; }
              .container { text-align: center; max-width: 480px; padding: 2rem; }
              h1 { font-size: 4rem; margin: 0; background: linear-gradient(135deg, #3b82f6, #8b5cf6); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
              p { color: #94a3b8; line-height: 1.6; }
              a { color: #3b82f6; text-decoration: none; }
              a:hover { text-decoration: underline; }
            </style>
          </head>
          <body>
            <div class="container">
              <h1>404</h1>
              <p>🔍 AgentLens couldn't find that page.</p>
              <p><a href="/">← Back to Documentation</a> · <a href="/demo/">Try the Demo</a> · <a href="/dashboard/">Dashboard</a></p>
            </div>
          </body>
          </html>
          EOF
          # Add .nojekyll to skip Jekyll processing
          touch _site/.nojekyll

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: '_site'

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
