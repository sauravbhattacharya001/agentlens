name: Code Coverage

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

permissions:
  contents: read
  pull-requests: write

jobs:
  # ── Python SDK Coverage ────────────────────────────────────────────
  sdk-coverage:
    name: SDK Coverage (Python 3.12)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sdk

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: sdk/pyproject.toml

      - name: Install SDK with dev dependencies
        run: pip install -e ".[dev]"

      - name: Run tests with coverage
        run: |
          pytest tests/ -v \
            --cov=agentlens \
            --cov-report=term-missing \
            --cov-report=xml:coverage.xml \
            --cov-report=html:htmlcov \
            --cov-report=json:coverage.json \
            --cov-branch \
            --cov-fail-under=80

      - name: Generate SDK coverage summary
        if: always()
        run: |
          python - <<'PYEOF'
          import json, os
          with open("coverage.json") as f:
              data = json.load(f)
          totals = data["totals"]
          pct_line = totals["percent_covered_display"]
          pct_branch = round(totals.get("covered_branches", 0) / max(totals.get("num_branches", 1), 1) * 100, 1)
          summary = f"""## 🐍 SDK Coverage Report

          | Metric | Value |
          |--------|-------|
          | **Line Coverage** | {pct_line}% |
          | **Branch Coverage** | {pct_branch}% |
          | **Lines Covered** | {totals['covered_lines']} / {totals['num_statements']} |
          | **Missing Lines** | {totals['missing_lines']} |

          """
          with open(os.environ["GITHUB_STEP_SUMMARY"], "a") as f:
              f.write(summary)
          PYEOF

      - name: Upload SDK coverage report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: sdk-coverage-report
          path: |
            sdk/htmlcov/
            sdk/coverage.xml
          retention-days: 14

      - name: Upload SDK coverage to Codecov
        if: always()
        uses: codecov/codecov-action@v5
        with:
          files: sdk/coverage.xml
          flags: sdk
          name: sdk-python
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  # ── Node.js Backend Coverage ───────────────────────────────────────
  backend-coverage:
    name: Backend Coverage (Node.js 22)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run tests with coverage
        run: npx jest --coverage --verbose --coverageReporters=text --coverageReporters=lcov --coverageReporters=json-summary

      - name: Generate backend coverage summary
        if: always()
        run: |
          node -e "
          const fs = require('fs');
          const summary = JSON.parse(fs.readFileSync('coverage/coverage-summary.json', 'utf8'));
          const t = summary.total;
          const md = [
            '## 📦 Backend Coverage Report',
            '',
            '| Metric | Covered | Total | Percentage |',
            '|--------|---------|-------|------------|',
            '| **Statements** | ' + t.statements.covered + ' | ' + t.statements.total + ' | ' + t.statements.pct + '% |',
            '| **Branches** | ' + t.branches.covered + ' | ' + t.branches.total + ' | ' + t.branches.pct + '% |',
            '| **Functions** | ' + t.functions.covered + ' | ' + t.functions.total + ' | ' + t.functions.pct + '% |',
            '| **Lines** | ' + t.lines.covered + ' | ' + t.lines.total + ' | ' + t.lines.pct + '% |',
            '',
          ].join('\n');
          fs.appendFileSync(process.env.GITHUB_STEP_SUMMARY, md);
          "

      - name: Upload backend coverage report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: backend-coverage-report
          path: |
            backend/coverage/
          retention-days: 14

      - name: Upload backend coverage to Codecov
        if: always()
        uses: codecov/codecov-action@v5
        with:
          files: backend/coverage/lcov.info
          flags: backend
          name: backend-node
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  # ── Coverage Gate ──────────────────────────────────────────────────
  coverage-gate:
    name: Coverage Gate
    runs-on: ubuntu-latest
    needs: [sdk-coverage, backend-coverage]
    if: always()
    steps:
      - name: Check coverage results
        run: |
          if [ "${{ needs.sdk-coverage.result }}" = "failure" ] || [ "${{ needs.backend-coverage.result }}" = "failure" ]; then
            echo "❌ Coverage thresholds not met"
            exit 1
          fi
          echo "✅ All coverage thresholds passed"
