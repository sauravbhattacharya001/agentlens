name: 📚 Documentation Issue
description: Report missing, incorrect, or unclear documentation
title: "[Docs]: "
labels: ["documentation"]
body:
  - type: markdown
    attributes:
      value: |
        Help us improve the AgentLens documentation! Please describe what's missing or unclear.

  - type: dropdown
    id: doc-type
    attributes:
      label: Documentation Area
      description: Which part of the documentation is affected?
      options:
        - README / Getting Started
        - API Reference
        - SDK Usage Examples
        - Dashboard Guide
        - LangChain Integration Guide
        - Deployment / Self-Hosting
        - Contributing Guide
        - Other
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: What's Wrong or Missing?
      description: Describe the documentation issue. Include links to the relevant section if applicable.
      placeholder: "The API reference doesn't document the `flush()` method on TrackerClient, which is needed for batch export."
    validations:
      required: true

  - type: textarea
    id: suggestion
    attributes:
      label: Suggested Improvement
      description: How should the documentation be improved?
    validations:
      required: false

  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: Any other context — screenshots, links to confusing sections, etc.
