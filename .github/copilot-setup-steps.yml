name: Copilot Setup Steps

on:
  push:

jobs:
  setup:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install backend dependencies
        working-directory: backend
        run: npm ci

      - name: Run backend tests
        working-directory: backend
        run: npm test

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python SDK
        working-directory: sdk
        run: pip install -e ".[dev]"

      - name: Run SDK tests with coverage
        working-directory: sdk
        run: python -m pytest --tb=short --cov=agentlens --cov-report=term -q || echo "Tests incomplete — check test output above"

      - name: Verify backend starts
        working-directory: backend
        run: |
          node server.js &
          sleep 3
          curl -sf http://localhost:3000/health && echo "Backend healthy"
          kill %1 2>/dev/null || true
